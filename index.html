<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="OldBoys"/>
  <title>OldBoys Senior Fútbol</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0f0a;color:#e8f5e8;font-family:'Barlow',sans-serif;min-height:100vh}
    .bebas{font-family:'Bebas Neue',sans-serif}
    button{cursor:pointer;font-family:'Barlow',sans-serif}
    input,select{font-family:'Barlow',sans-serif}
    select option{background:#0d150d}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#1a4d1a;border-radius:3px}
    .hidden{display:none!important}
    table{width:100%;border-collapse:collapse}
    .fade-in{animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:32px">
  <div style="text-align:center">
    <div style="font-size:64px;margin-bottom:8px">⚽</div>
    <div class="bebas" style="font-size:38px;letter-spacing:4px;color:#7fff7f;line-height:1">OLDBOYS</div>
    <div style="font-size:11px;letter-spacing:5px;color:#5a7a5a;text-transform:uppercase;margin-top:4px">SENIOR FÚTBOL</div>
  </div>
  <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px">
    <button onclick="enterAsPlayer()" style="background:#1a4d1a;border:1px solid #3ddc3d;color:#7fff7f;padding:16px;border-radius:10px;font-size:16px;font-weight:700;letter-spacing:1px">
      👤 Entrar como Jugador
    </button>
    <div style="background:#111911;border:1px solid #1e331e;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:8px">
      <div style="font-size:12px;color:#5a7a5a;font-weight:600;letter-spacing:1px">🔐 ACCESO ADMINISTRADOR</div>
      <input type="password" id="pwdInput" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryAdmin()"
        style="background:#0d150d;border:1px solid #1e331e;color:#e8f5e8;padding:12px 14px;border-radius:6px;font-size:15px;outline:none;width:100%"/>
      <div id="pwdError" style="color:#ff4444;font-size:12px;display:none">Contraseña incorrecta</div>
      <button onclick="tryAdmin()" style="background:#0d150d;border:1px solid #3ddc3d;color:#3ddc3d;padding:12px;border-radius:6px;font-size:14px;font-weight:700">
        Entrar como Admin
      </button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden">
  <!-- HEADER -->
  <div id="bdayBanner" class="hidden" style="background:#1a1200;border-bottom:2px solid #4d3800;padding:10px 20px"></div>
  <header style="background:#0d150d;border-bottom:2px solid #1e331e;position:sticky;top:0;z-index:100">
    <div style="max-width:1100px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:32px">⚽</span>
        <div>
          <div class="bebas" style="font-size:26px;letter-spacing:3px;color:#7fff7f;line-height:1">OLDBOYS</div>
          <div style="font-size:10px;letter-spacing:4px;color:#5a7a5a;text-transform:uppercase">SENIOR FÚTBOL</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <nav style="display:flex;gap:4px">
          <button onclick="setTab('jugadores')" id="tab-jugadores" class="navBtn active">Jugadores</button>
          <button onclick="setTab('entrenamientos')" id="tab-entrenamientos" class="navBtn">Entrenamientos</button>
          <button onclick="setTab('partidos')" id="tab-partidos" class="navBtn">Partidos</button>
          <button onclick="setTab('estadisticas')" id="tab-estadisticas" class="navBtn">Estadísticas</button>
        </nav>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="roleLabel" style="font-size:11px;font-weight:700;letter-spacing:1px"></span>
          <span id="syncDot" title="Conectando...">🟡</span>
          <button onclick="logout()" style="background:transparent;border:1px solid #1e331e;color:#5a7a5a;padding:4px 8px;border-radius:4px;font-size:11px">Salir</button>
        </div>
      </div>
    </div>
  </header>

  <main style="max-width:1100px;margin:0 auto;padding:24px 20px">
    <div id="tab-jugadores-content" class="tab-content fade-in"></div>
    <div id="tab-entrenamientos-content" class="tab-content fade-in hidden"></div>
    <div id="tab-partidos-content" class="tab-content fade-in hidden"></div>
    <div id="tab-estadisticas-content" class="tab-content fade-in hidden"></div>
  </main>
</div>

<style>
  .navBtn{background:transparent;border:1px solid #1e331e;color:#5a7a5a;padding:8px 14px;border-radius:4px;font-size:12px;font-weight:600;letter-spacing:1px;transition:all .2s}
  .navBtn.active{background:#1a4d1a;border-color:#3ddc3d;color:#7fff7f}
  .card{background:#111911;border:1px solid #1e331e;border-radius:8px;padding:16px;margin-bottom:12px}

  .btn-red{background:transparent;border:1px solid #4d1a1a;color:#ff6b6b;padding:6px 10px;border-radius:4px;font-size:12px}
  .btn-ghost{background:transparent;border:1px solid #1e331e;color:#5a7a5a;padding:8px 14px;border-radius:6px;font-size:13px}
  .inp{background:#0d150d;border:1px solid #1e331e;color:#e8f5e8;padding:10px 12px;border-radius:6px;font-size:14px;width:100%;outline:none}
  .sel{background:#0d150d;border:1px solid #1e331e;color:#e8f5e8;padding:10px 12px;border-radius:6px;font-size:14px;outline:none}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
  .section-title{font-family:"Bebas Neue",sans-serif;font-size:26px;letter-spacing:3px;color:#7fff7f;margin-bottom:16px}
  .sub-title{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;color:#7fff7f;margin-bottom:10px}
  .empty{text-align:center;color:#5a7a5a;padding:40px 20px;border:1px dashed #1e331e;border-radius:8px}
  .check-on{background:#1a4d1a;border:none;color:#7fff7f;width:36px;height:36px;border-radius:6px;font-size:16px;font-weight:700}
  .check-off{background:#1a1a1a;border:none;color:#ff4444;width:36px;height:36px;border-radius:6px;font-size:16px;font-weight:700}
  .check-locked-on{display:inline-flex;align-items:center;justify-content:center;background:#0d2b0d;color:#3ddc3d;width:36px;height:36px;border-radius:6px;font-size:16px;font-weight:700;opacity:.8}
  .check-locked-off{display:inline-flex;align-items:center;justify-content:center;background:#1a0d0d;color:#994444;width:36px;height:36px;border-radius:6px;font-size:16px;font-weight:700;opacity:.7}
  .player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .player-card{background:#111911;border:1px solid #1e331e;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px}
  .score-num{font-family:"Bebas Neue",sans-serif;font-size:52px;color:#7fff7f;line-height:1}
  th{background:#0a0f0a;padding:10px 10px;font-size:12px;color:#7fff7f;font-weight:700;border:1px solid #1e331e}
  td{padding:8px 10px;border:1px solid #1e331e;font-size:13px}
  tr:nth-child(even){background:#0d150d}
  tr:nth-child(odd){background:#111911}
</style>

  { id: 29, name: "Ismael Robles",       pos: "Mediocampista", num: "6",  cat: "SENIOR", bday: "9 Feb",  goals: 0, assists: 0, mvp: 0 },
  { id: 30, name: "Tomás Smith",         pos: "Portero",       num: "1",  cat: "SENIOR", bday: "19 Dic", goals: 0, assists: 0, mvp: 0 },
  { id: 31, name: "Carlos Gamboa",       pos: "Portero",       num: "–",  cat: "SENIOR", bday: "–",      goals: 0, assists: 0, mvp: 0 },
  { id: 32, name: "Lucca Vallarino",     pos: "Mediocampista", num: "–",  cat: "SENIOR", bday: "7 Ago",  goals: 0, assists: 0, mvp: 0 },

const initialTrainings = [
  { id: 1, date: "2025-04-01", day: "Martes", confirmed: [] },
  { id: 2, date: "2025-04-03", day: "Jueves", confirmed: [] },
  { id: 3, date: "2025-04-08", day: "Martes", confirmed: [] },
  { id: 4, date: "2025-04-10", day: "Jueves", confirmed: [] },
];

const initialMatches = [];
const ADMIN_PWD = "270581";
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

// State
let state = {
  players: initialPlayers,
  trainings: initialTrainings,
  matches: initialMatches,
  role: null,
  currentTab: 'jugadores',
  synced: false,
  editingMatch: null,
  creatingMatch: false,
};

// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAHOqyac7in_PWeLnD3w49StsgQA8nJmkw",
  authDomain: "oldboys-liga.firebaseapp.com",
  projectId: "oldboys-liga",
  storageBucket: "oldboys-liga.firebasestorage.app",
  messagingSenderId: "870515560346",
  appId: "1:870515560346:web:f9950abab9ffdc38383423"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("liga").doc("data");

function persistToFirebase() {
  docRef.set({ players: state.players, trainings: state.trainings, matches: state.matches }).catch(console.error);
}

// Auth
function tryAdmin() {
  const pwd = document.getElementById('pwdInput').value;
  if (pwd === ADMIN_PWD) { state.role = 'admin'; enterApp(); }
  else {
    const err = document.getElementById('pwdError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 1500);
  }
}
function enterAsPlayer() { state.role = 'player'; enterApp(); }
function logout() {
  state.role = null;
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}
function enterApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  const isAdmin = state.role === 'admin';
  document.getElementById('roleLabel').textContent = isAdmin ? '🔐 ADMIN' : '👤 JUGADOR';
  document.getElementById('roleLabel').style.color = isAdmin ? '#ffd700' : '#5a7a5a';

  // Subscribe to Firebase
  docRef.onSnapshot(snap => {
    if (snap.exists) {
      const d = snap.data();
      if (d.players) state.players = d.players;
      if (d.trainings) state.trainings = d.trainings;
      if (d.matches) state.matches = d.matches;
    }
    state.synced = true;
    document.getElementById('syncDot').textContent = '🟢';
    renderCurrentTab();
    checkBirthdays();
  });

  renderCurrentTab();
}

function setTab(tab) {
  state.currentTab = tab;
  state.creatingMatch = false;
  state.editingMatch = null;
  document.querySelectorAll('.navBtn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById('tab-' + tab + '-content').classList.remove('hidden');
  renderCurrentTab();
}

function renderCurrentTab() {
  switch(state.currentTab) {
    case 'jugadores': renderPlayers(); break;
    case 'entrenamientos': renderTrainings(); break;
    case 'partidos': renderMatches(); break;
    case 'estadisticas': renderStats(); break;
  }
}

function fmt(dateStr) {
  if (!dateStr) return '–';
  const [y,m,d] = dateStr.split('-');
  return parseInt(d) + ' ' + MONTHS[parseInt(m)-1] + ' ' + y;
}

function isPast(dateStr) {
  if (!dateStr) return false;
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + 1);
  return d <= new Date();
}

function checkBirthdays() {
  const now = new Date();
  const todayStr = now.getDate() + ' ' + MONTHS[now.getMonth()];
  const tom = new Date(now); tom.setDate(now.getDate()+1);
  const tomStr = tom.getDate() + ' ' + MONTHS[tom.getMonth()];
  const bdays = state.players.filter(p => p.bday === todayStr || p.bday === tomStr);
  const banner = document.getElementById('bdayBanner');
  if (bdays.length === 0) { banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  banner.innerHTML = bdays.map(p => {
    const isToday = p.bday === todayStr;
    return `<div style="display:flex;align-items:center;gap:10px;max-width:1100px;margin:0 auto;font-size:14px">
      <span style="font-size:22px">${isToday ? '🎂' : '🎁'}</span>
      <span>${isToday ? '¡HOY es el cumpleaños de ' : 'Mañana es el cumpleaños de '}<b>${p.name}</b>!
      ${isToday ? ' ¡Felicitaciones! 🎉' : ' No olvides felicitarlo 👏'}</span></div>`;
  }).join('');
}

// ─── PLAYERS ─────────────────────────────────────────────────────────────────
let playerFilter = 'TODAS';
function renderPlayers() {
  const isAdmin = state.role === 'admin';
  const filtered = playerFilter === 'TODAS' ? state.players : state.players.filter(p => (p.cat||'').toUpperCase() === playerFilter);
  const counts = { TODAS: state.players.length, SENIOR: state.players.filter(p=>(p.cat||'').toUpperCase()==='SENIOR').length, AMBAS: state.players.filter(p=>(p.cat||'').toUpperCase()==='AMBAS').length };
  document.getElementById('tab-jugadores-content').innerHTML = `
    <div class="section-title">PLANTILLA</div>
    ${isAdmin ? `<div class="card row">
      <input class="inp" id="pName" placeholder="Nombre completo" style="flex:1;min-width:150px"/>
      <input class="inp" id="pNum" placeholder="#" style="width:60px"/>
      <select class="sel" id="pPos"><option>Portero</option><option>Defensa</option><option>Lateral</option><option>Mediocampista</option><option selected>Delantero</option></select>
      <select class="sel" id="pCat"><option>SENIOR</option><option>AMBAS</option></select>
      <input class="inp" id="pBday" placeholder="Cumple (ej: 9 May)" style="width:130px"/>
      <button class="btn-green" onclick="addPlayer()">+ Añadir</button>
    </div>` : ''}
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${['TODAS','SENIOR','AMBAS'].map(f => `<button onclick="filterPlayers('${f}')" class="navBtn ${playerFilter===f?'active':''}">${f} (${counts[f]})</button>`).join('')}
    </div>
    ${filtered.length === 0 ? '<div class="empty">No hay jugadores en esta categoría</div>' :
    `<div class="player-grid">${filtered.map(p => `
      <div class="player-card">
        <div class="bebas" style="font-size:26px;color:#3ddc3d;width:34px;text-align:center;opacity:.8">${p.num}</div>
        <div style="flex:1">
          <div style="font-weight:700;font-size:14px">${p.name}</div>
          <div style="display:flex;gap:6px;margin-top:3px;flex-wrap:wrap">
            <span style="font-size:11px;color:#5a7a5a">${p.pos}</span>
            <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;${(p.cat||'').toUpperCase()==='AMBAS'?'background:#2d1a4d;color:#c47aff':'background:#1a2d4d;color:#7ab3ff'}">${p.cat}</span>
          </div>
          ${p.bday && p.bday !== '–' ? `<div style="font-size:11px;color:#5a7a5a;margin-top:2px">🎂 ${p.bday}</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;font-size:12px;color:#5a7a5a">
          <span>⚽${getPlayerGoals(p.name)}</span>
          <span>🎯${getPlayerAssists(p.name)}</span>
          <span>🏅${getPlayerMVP(p.name)}</span>
        </div>
        ${isAdmin ? `<button class="btn-red" onclick="removePlayer(${p.id})">✕</button>` : ''}
      </div>`).join('')}</div>`}`;
}

function filterPlayers(f) { playerFilter = f; renderPlayers(); }

function addPlayer() {
  const name = document.getElementById('pName').value.trim();
  if (!name) return;
  state.players.push({ id: Date.now(), name, pos: document.getElementById('pPos').value, num: document.getElementById('pNum').value || '–', cat: document.getElementById('pCat').value, bday: document.getElementById('pBday').value, goals:0, assists:0, mvp:0 });
  persistToFirebase();
  document.getElementById('pName').value = '';
  document.getElementById('pNum').value = '';
  document.getElementById('pBday').value = '';
  renderPlayers();
}

function removePlayer(id) {
  state.players = state.players.filter(p => p.id !== id);
  persistToFirebase();
  renderPlayers();
}

function getPlayerGoals(name) { return state.matches.reduce((s,m) => s + (m.goals||[]).filter(g=>g.scorer===name).length, 0); }
function getPlayerAssists(name) { return state.matches.reduce((s,m) => s + (m.goals||[]).filter(g=>g.assist===name).length, 0); }
function getPlayerMVP(name) { return state.matches.filter(m=>m.mvp===name).length; }
function getPlayerYellows(name) { return state.matches.reduce((s,m) => s + (m.cards||[]).filter(c=>c.player===name&&c.type==='amarilla').length, 0); }
function getPlayerReds(name) { return state.matches.reduce((s,m) => s + (m.cards||[]).filter(c=>c.player===name&&c.type==='roja').length, 0); }

// ─── TRAININGS ───────────────────────────────────────────────────────────────
function renderTrainings() {
  const isAdmin = state.role === 'admin';
  const sorted = [...state.trainings].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('tab-entrenamientos-content').innerHTML = `
    <div class="section-title">ENTRENAMIENTOS</div>
    ${isAdmin ? `<div class="card row">
      <input type="date" class="inp" id="tDate" style="flex:1"/>
      <select class="sel" id="tDay"><option>Martes</option><option>Jueves</option></select>
      <button class="btn-green" onclick="addTraining()">+ Agregar</button>
    </div>` : ''}
    ${state.players.length === 0 ? '<div class="empty">Registra jugadores primero</div>' :
    `<div style="overflow-x:auto"><table>
      <thead><tr>
        <th style="text-align:left;min-width:160px;position:sticky;left:0">Jugador</th>
        ${sorted.map(t => {
          const past = isPast(t.date);
          return `<th style="min-width:90px;text-align:center;${past?'opacity:.6':''}">
            <div style="font-size:10px;font-weight:700;background:#1a4d1a;color:#7fff7f;padding:2px 6px;border-radius:10px;display:inline-block">${t.day.slice(0,3)}</div><br>
            <span style="font-size:10px;color:#5a7a5a">${fmt(t.date)}</span><br>
            ${past ? '<span style="font-size:10px">🔒</span>' : (isAdmin ? `<button onclick="removeTraining(${t.id})" style="background:none;border:none;color:#ff6b6b;font-size:10px;cursor:pointer">✕</button>` : '')}
            <br><span style="font-size:10px;color:#5a7a5a">${t.confirmed.length}/${state.players.length}</span>
          </th>`;
        }).join('')}
        <th style="min-width:80px;text-align:center">% Asist.</th>
      </tr></thead>
      <tbody>${state.players.map(p => {
        const pastT = sorted.filter(t=>isPast(t.date));
        const attended = pastT.filter(t=>t.confirmed.includes(p.id)).length;
        const pct = pastT.length > 0 ? Math.round(attended/pastT.length*100) : null;
        const pctColor = pct>=75?'#3ddc3d':pct>=50?'#f0a500':'#ff4444';
        return `<tr>
          <td style="position:sticky;left:0;background:#111911;font-weight:600"><span class="bebas" style="color:#3ddc3d;margin-right:6px">${p.num}</span>${p.name}</td>
          ${sorted.map(t => {
            const conf = t.confirmed.includes(p.id);
            const past = isPast(t.date);
            return `<td style="text-align:center">${past
              ? `<span class="${conf?'check-locked-on':'check-locked-off'}">${conf?'✓':'✗'}</span>`
              : `<button class="${conf?'check-on':'check-off'}" onclick="toggleTraining(${t.id},${p.id})">${conf?'✓':'✗'}</button>`}</td>`;
          }).join('')}
          <td style="text-align:center">${pct !== null
            ? `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
                <div style="width:50px;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pctColor};border-radius:3px"></div></div>
                <span style="font-size:12px;font-weight:700;color:${pctColor}">${pct}%</span></div>`
            : '<span style="color:#5a7a5a;font-size:11px">–</span>'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}`;
}

function addTraining() {
  const date = document.getElementById('tDate').value;
  if (!date) return;
  state.trainings.push({ id: Date.now(), date, day: document.getElementById('tDay').value, confirmed: [] });
  persistToFirebase();
  renderTrainings();
}
function removeTraining(id) {
  state.trainings = state.trainings.filter(t => t.id !== id);
  persistToFirebase();
  renderTrainings();
}
function toggleTraining(tId, pId) {
  state.trainings = state.trainings.map(t => {
    if (t.id !== tId) return t;
    const has = t.confirmed.includes(pId);
    return { ...t, confirmed: has ? t.confirmed.filter(x=>x!==pId) : [...t.confirmed, pId] };
  });
  persistToFirebase();
  renderTrainings();
}

// ─── MATCHES ─────────────────────────────────────────────────────────────────
function renderMatches() {
  const isAdmin = state.role === 'admin';
  if (isAdmin && state.creatingMatch) { renderMatchForm(null); return; }
  if (isAdmin && state.editingMatch) { renderMatchForm(state.editingMatch); return; }

  const sorted = [...state.matches].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  document.getElementById('tab-partidos-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" style="margin:0">PARTIDOS</div>
      ${isAdmin ? `<button class="btn-green" onclick="startCreateMatch()">+ Nuevo Partido</button>` : ''}
    </div>
    ${sorted.length === 0 ? '<div class="empty">No hay partidos registrados</div>' :
    sorted.map(m => {
      const result = m.scoreA > m.scoreB ? 'W' : m.scoreA === m.scoreB ? 'D' : 'L';
      const rColor = result==='W'?'#7fff7f':result==='D'?'#aaa':'#ff6b6b';
      const rBg = result==='W'?'#1a4d1a':result==='D'?'#333':'#4d1a1a';
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="color:#5a7a5a;font-size:13px">${fmt(m.date)} — Sábado</span>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="background:${rBg};color:${rColor};padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700">${result}</span>
            ${isAdmin ? `<button onclick="editMatch(${m.id})" style="background:transparent;border:1px solid #1e331e;color:#5a7a5a;padding:5px 8px;border-radius:4px;font-size:12px">✏️</button>
            <button class="btn-red" onclick="removeMatch(${m.id})">✕</button>` : ''}
          </div>
        </div>
        <div style="display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:12px">
          <div style="text-align:center"><div style="font-size:11px;color:#5a7a5a;text-transform:uppercase;letter-spacing:1px">${m.teamA||'Oldboys'}</div><div class="score-num">${m.scoreA??'–'}</div></div>
          <div class="bebas" style="font-size:20px;color:#5a7a5a">VS</div>
          <div style="text-align:center"><div class="score-num">${m.scoreB??'–'}</div><div style="font-size:11px;color:#5a7a5a;text-transform:uppercase;letter-spacing:1px">${m.teamB||'Rival'}</div></div>
        </div>
        ${(m.goals||[]).length>0?`<div style="border-top:1px solid #1e331e;padding-top:10px;margin-top:4px"><div style="font-size:12px;color:#5a7a5a;font-weight:700;margin-bottom:4px">⚽ Goles</div>${m.goals.map(g=>`<div style="font-size:13px;padding:2px 0"><b>${g.scorer}</b>${g.assist?`<span style="color:#5a7a5a;font-size:11px"> (Ast: ${g.assist})</span>`:''}</div>`).join('')}</div>`:''}
        ${(m.cards||[]).length>0?`<div style="border-top:1px solid #1e331e;padding-top:10px;margin-top:4px"><div style="font-size:12px;color:#5a7a5a;font-weight:700;margin-bottom:4px">🟨 Tarjetas</div>${m.cards.map(c=>`<div style="font-size:13px;padding:2px 0">${c.type==='amarilla'?'🟨':'🟥'} <b>${c.player}</b></div>`).join('')}</div>`:''}
        ${m.mvp?`<div style="margin-top:10px;background:#1a1400;border:1px solid #4d3d00;color:#ffd700;padding:8px 12px;border-radius:6px;font-size:13px">🏅 MVP: <b>${m.mvp}</b></div>`:''}
        ${!isPast(m.date)?`<div style="border-top:1px solid #1e331e;padding-top:10px;margin-top:10px">
          <div style="font-size:12px;color:#5a7a5a;font-weight:700;margin-bottom:6px">✅ Confirmados (${(m.confirmed||[]).length})</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">${state.players.map(p=>{
            const conf=(m.confirmed||[]).includes(p.id);
            return `<button onclick="toggleMatchConfirm(${m.id},${p.id})" style="background:${conf?'#1a4d1a':'#0d150d'};border:1px solid ${conf?'#3ddc3d':'#1e331e'};color:${conf?'#7fff7f':'#5a7a5a'};padding:4px 10px;border-radius:20px;font-size:12px">${conf?'✓ ':''}${p.name}</button>`;
          }).join('')}</div></div>`:''}
      </div>`;
    }).join('')}`;
}

function startCreateMatch() { state.creatingMatch = true; renderMatches(); }
function editMatch(id) { state.editingMatch = state.matches.find(m=>m.id===id); renderMatches(); }
function removeMatch(id) { state.matches = state.matches.filter(m=>m.id!==id); persistToFirebase(); renderMatches(); }
function toggleMatchConfirm(mId, pId) {
  state.matches = state.matches.map(m => {
    if (m.id!==mId) return m;
    const conf = m.confirmed||[];
    return {...m, confirmed: conf.includes(pId) ? conf.filter(x=>x!==pId) : [...conf,pId]};
  });
  persistToFirebase(); renderMatches();
}

function renderMatchForm(existing) {
  const goals = existing ? (existing.goals||[]) : [];
  const cards = existing ? (existing.cards||[]) : [];
  const mvpVotes = existing ? (existing.mvpVotes||{}) : {};
  window._mGoals = [...goals];
  window._mCards = [...cards];
  window._mVotes = {...mvpVotes};
  window._mMvp = existing ? (existing.mvp||'') : '';

  document.getElementById('tab-partidos-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" style="margin:0">${existing?'EDITAR':'NUEVO'} PARTIDO</div>
      <button class="btn-ghost" onclick="cancelMatchForm()">← Volver</button>
    </div>
    <div class="card">
      <div class="row">
        <label style="color:#5a7a5a;font-size:13px">Fecha</label>
        <input type="date" class="inp" id="mDate" value="${existing?.date||''}" style="flex:1"/>
      </div>
      <div class="row">
        <input class="inp" id="mTeamA" value="${existing?.teamA||'Oldboys'}" placeholder="Equipo A" style="flex:1"/>
        <input class="inp" id="mScoreA" value="${existing?.scoreA??''}" placeholder="Goles" style="width:60px;text-align:center"/>
        <span style="color:#7fff7f;font-weight:700">–</span>
        <input class="inp" id="mScoreB" value="${existing?.scoreB??''}" placeholder="Goles" style="width:60px;text-align:center"/>
        <input class="inp" id="mTeamB" value="${existing?.teamB||''}" placeholder="Rival" style="flex:1"/>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="sub-title" style="margin:0">⚽ Goles</div>
        <button class="btn-green" onclick="addMatchGoal()">+ Gol</button>
      </div>
      <div id="goalsContainer">${renderGoalsHTML()}</div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="sub-title" style="margin:0">🟨 Tarjetas</div>
        <button class="btn-green" onclick="addMatchCard()">+ Tarjeta</button>
      </div>
      <div id="cardsContainer">${renderCardsHTML()}</div>
    </div>
    <div class="card">
      <div class="sub-title">🏅 Votar MVP</div>
      <div id="mvpContainer" style="display:flex;flex-wrap:wrap;gap:8px">${renderMvpHTML()}</div>
      <div id="mvpBanner" style="${window._mMvp?'':'display:none'}margin-top:10px;background:#1a1400;border:1px solid #4d3d00;color:#ffd700;padding:8px 12px;border-radius:6px;font-size:13px">🏅 MVP: <b id="mvpName">${window._mMvp}</b></div>
    </div>
    <button class="btn-green" onclick="saveMatch(${existing?existing.id:'null'})" style="width:100%;padding:14px;margin-top:8px;font-size:15px">💾 Guardar Partido</button>`;
}

function renderGoalsHTML() {
  if (window._mGoals.length === 0) return '<div style="color:#5a7a5a;font-size:13px">Sin goles anotados</div>';
  return window._mGoals.map((g,i) => `<div class="row" style="margin-bottom:8px">
    <select class="sel" onchange="window._mGoals[${i}].scorer=this.value" style="flex:1">
      <option value="">— Goleador —</option>
      ${state.players.map(p=>`<option ${g.scorer===p.name?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <select class="sel" onchange="window._mGoals[${i}].assist=this.value" style="flex:1">
      <option value="">— Asistencia —</option>
      ${state.players.map(p=>`<option ${g.assist===p.name?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <button class="btn-red" onclick="removeGoal(${i})">✕</button>
  </div>`).join('');
}

function renderCardsHTML() {
  if (window._mCards.length === 0) return '<div style="color:#5a7a5a;font-size:13px">Sin tarjetas</div>';
  return window._mCards.map((c,i) => `<div class="row" style="margin-bottom:8px">
    <select class="sel" onchange="window._mCards[${i}].player=this.value" style="flex:1">
      <option value="">— Jugador —</option>
      ${state.players.map(p=>`<option ${c.player===p.name?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <select class="sel" onchange="window._mCards[${i}].type=this.value" style="background:${c.type==='amarilla'?'#2d2200':'#2d0000'};color:${c.type==='amarilla'?'#ffd700':'#ff4444'}">
      <option value="amarilla" ${c.type==='amarilla'?'selected':''}>🟨 Amarilla</option>
      <option value="roja" ${c.type==='roja'?'selected':''}>🟥 Roja</option>
    </select>
    <button class="btn-red" onclick="removeCard(${i})">✕</button>
  </div>`).join('');
}

function renderMvpHTML() {
  return state.players.map(p => {
    const votes = window._mVotes[p.id]||0;
    const isMvp = window._mMvp === p.name;
    return `<button onclick="voteForMvp(${p.id},'${p.name}')" style="background:${isMvp?'#1a4d1a':'#0d150d'};border:1px solid ${isMvp?'#3ddc3d':'#1e331e'};color:${isMvp?'#7fff7f':'#5a7a5a'};padding:6px 12px;border-radius:20px;font-size:12px">${p.name}${votes?` (${votes})`:''}</button>`;
  }).join('');
}

function addMatchGoal() { window._mGoals.push({scorer:'',assist:''}); document.getElementById('goalsContainer').innerHTML = renderGoalsHTML(); }
function removeGoal(i) { window._mGoals.splice(i,1); document.getElementById('goalsContainer').innerHTML = renderGoalsHTML(); }
function addMatchCard() { window._mCards.push({player:'',type:'amarilla'}); document.getElementById('cardsContainer').innerHTML = renderCardsHTML(); }
function removeCard(i) { window._mCards.splice(i,1); document.getElementById('cardsContainer').innerHTML = renderCardsHTML(); }
function voteForMvp(id, name) {
  window._mVotes[id] = (window._mVotes[id]||0)+1;
  const top = Object.entries(window._mVotes).sort((a,b)=>b[1]-a[1])[0];
  window._mMvp = state.players.find(p=>p.id===parseInt(top[0]))?.name||'';
  document.getElementById('mvpContainer').innerHTML = renderMvpHTML();
  document.getElementById('mvpBanner').style.display = '';
  document.getElementById('mvpName').textContent = window._mMvp;
}
function cancelMatchForm() { state.creatingMatch=false; state.editingMatch=null; renderMatches(); }
function saveMatch(existingId) {
  const match = {
    id: existingId || Date.now(),
    date: document.getElementById('mDate').value,
    teamA: document.getElementById('mTeamA').value,
    teamB: document.getElementById('mTeamB').value,
    scoreA: parseInt(document.getElementById('mScoreA').value)||0,
    scoreB: parseInt(document.getElementById('mScoreB').value)||0,
    goals: window._mGoals,
    cards: window._mCards,
    mvp: window._mMvp,
    mvpVotes: window._mVotes,
    confirmed: existingId ? (state.matches.find(m=>m.id===existingId)?.confirmed||[]) : []
  };
  if (existingId) state.matches = state.matches.map(m=>m.id===existingId?match:m);
  else state.matches.push(match);
  persistToFirebase();
  state.creatingMatch=false; state.editingMatch=null;
  renderMatches();
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const wins = state.matches.filter(m=>m.scoreA>m.scoreB).length;
  const draws = state.matches.filter(m=>m.scoreA===m.scoreB&&m.date).length;
  const losses = state.matches.filter(m=>m.scoreA<m.scoreB).length;
  const totalY = state.matches.reduce((s,m)=>s+(m.cards||[]).filter(c=>c.type==='amarilla').length,0);
  const totalR = state.matches.reduce((s,m)=>s+(m.cards||[]).filter(c=>c.type==='roja').length,0);

  const pStats = state.players.map(p => ({
    ...p,
    goals: getPlayerGoals(p.name),
    assists: getPlayerAssists(p.name),
    mvp: getPlayerMVP(p.name),
    yellows: getPlayerYellows(p.name),
    reds: getPlayerReds(p.name)
  }));

  const topScorers = [...pStats].sort((a,b)=>b.goals-a.goals).filter(p=>p.goals>0).slice(0,5);
  const topAssists = [...pStats].sort((a,b)=>b.assists-a.assists).filter(p=>p.assists>0).slice(0,5);
  const topMvp = [...pStats].sort((a,b)=>b.mvp-a.mvp).filter(p=>p.mvp>0).slice(0,3);
  const withCards = pStats.filter(p=>p.yellows>0||p.reds>0).sort((a,b)=>(b.yellows+b.reds*2)-(a.yellows+a.reds*2));

  const board = (title, data, field, color) => `<div class="card"><div class="bebas" style="font-size:18px;letter-spacing:2px;color:${color||'#7fff7f'};margin-bottom:10px">${title}</div>
    ${data.length===0?'<div style="color:#5a7a5a;font-size:13px">Sin datos</div>':data.map((p,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #1e331e">
      <span class="bebas" style="font-size:20px;color:#3ddc3d;width:20px">${i+1}</span>
      <span style="flex:1;font-size:14px">${p.name}</span>
      <span style="font-weight:700;color:${color||'#7fff7f'}">${p[field]}</span>
    </div>`).join('')}</div>`;

  document.getElementById('tab-estadisticas-content').innerHTML = `
    <div class="section-title">ESTADÍSTICAS</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px">
      ${[['Partidos',state.matches.length,'#7fff7f'],['Victorias',wins,'#7fff7f'],['Empates',draws,'#aaa'],['Derrotas',losses,'#ff6b6b'],['🟨 Amarillas',totalY,'#ffd700'],['🟥 Rojas',totalR,'#ff4444']].map(([l,v,c])=>`
        <div class="card" style="text-align:center;padding:16px">
          <div class="bebas" style="font-size:36px;color:${c}">${v}</div>
          <div style="font-size:11px;color:#5a7a5a;text-transform:uppercase;letter-spacing:1px;margin-top:4px">${l}</div>
        </div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px">
      ${board('⚽ Goleadores',topScorers,'goals')}
      ${board('🎯 Asistencias',topAssists,'assists')}
      ${board('🏅 MVP',topMvp,'mvp')}
    </div>
    <div class="sub-title">🟨🟥 Tarjetas por Jugador</div>
    ${withCards.length===0?'<div class="empty">Sin tarjetas registradas</div>':`<div style="overflow-x:auto"><table>
      <thead><tr><th style="text-align:left">Jugador</th><th>🟨</th><th>🟥</th><th>Historial</th></tr></thead>
      <tbody>${withCards.map(p=>{
        const susp = p.yellows>=2;
        const matchCards = state.matches.filter(m=>(m.cards||[]).some(c=>c.player===p.name)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        return `<tr style="${susp?'background:#1a0d00':''}">
          <td><span class="bebas" style="color:#3ddc3d;margin-right:6px">${p.num}</span>${p.name}${susp?'<span style="font-size:10px;background:#4d2000;color:#ff9900;padding:2px 6px;border-radius:8px;font-weight:700;margin-left:6px">⚠️ RIESGO</span>':''}</td>
          <td style="text-align:center;color:${p.yellows>0?'#ffd700':'#5a7a5a'};font-weight:700">${p.yellows||'–'}</td>
          <td style="text-align:center;color:${p.reds>0?'#ff4444':'#5a7a5a'};font-weight:700">${p.reds||'–'}</td>
          <td><div style="display:flex;flex-wrap:wrap;gap:4px">${matchCards.map(m=>{
            const pc = (m.cards||[]).filter(c=>c.player===p.name);
            return `<div style="display:flex;align-items:center;gap:4px;background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:3px 8px;font-size:11px">
              <span style="color:#aaa">${fmt(m.date)}</span>
              <span style="color:#5a7a5a;font-style:italic">vs ${m.teamB||'Rival'}</span>
              <span>${pc.map(c=>c.type==='amarilla'?'🟨':'🟥').join('')}</span>
            </div>`;
          }).join('')}</div></td>
        </tr>`;
      }).join('')}</tbody></table></div>`}
    <div style="margin-top:20px"><div class="sub-title">Resultados</div>
    ${state.matches.length===0?'<div class="empty">Sin partidos</div>':
    [...state.matches].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(m=>{
      const r=m.scoreA>m.scoreB?'W':m.scoreA===m.scoreB?'D':'L';
      const rc=r==='W'?'#7fff7f':r==='D'?'#aaa':'#ff6b6b';
      const rbg=r==='W'?'#1a4d1a':r==='D'?'#333':'#4d1a1a';
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#111911;border-radius:6px;margin-bottom:6px;flex-wrap:wrap">
        <span style="color:#5a7a5a;font-size:12px;width:90px">${fmt(m.date)}</span>
        <span style="flex:1;font-size:14px">${m.teamA||'Oldboys'} <b>${m.scoreA} – ${m.scoreB}</b> ${m.teamB||'Rival'}</span>
        <span style="background:${rbg};color:${rc};padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700">${r}</span>
      </div>`;
    }).join('')}</div>`;
}
</script>
</body>
</html>
